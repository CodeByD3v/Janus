[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "janus-sandbox"
version = "0.1.0"
description = "A deterministic, Docker-based secure execution sandbox for AI coding agents."
readme = "README.md"
requires-python = ">=3.9"
authors = [
  {name = "Janus Team"}
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Topic :: Software Development :: Testing",
    "Topic :: Security",
]
dependencies = []

[project.urls]
"Homepage" = "https://github.com/CodeByD3v/Janus"
